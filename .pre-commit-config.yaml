repos:
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.1.0
    hooks:
      - id: black
        types: [file]
        files: \.(py|py.in)$
        exclude: '(src/bindings/python/bt2/bt2/local_typing.py|tests/utils/python/vendor/.*)'
  - repo:  https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        types: [file]
        files: \.(py|py.in)$
        exclude: '(src/bindings/python/bt2/bt2/local_typing.py|tests/utils/python/vendor/.*)'
  - repo: https://github.com/pycqa/isort
    rev: 7.0.0
    hooks:
      - id: isort
        types: [file]
        files: \.(py|py.in)$
        exclude: '(src/bindings/python/bt2/bt2/local_typing.py|tests/utils/python/vendor/.*)'
