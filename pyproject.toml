[tool.black]
  include = '''
  (
       \.pyi?$
     | \.py\.in$
  )
  '''
  exclude = '''
  (
       src/bindings/python/bt2/build/
     | src/bindings/python/bt2/setup\.py$
     | src/bindings/python/bt2/bt2/local_typing\.py$
     | src/bindings/python/bt2/bt2/native_bt\.py$
     | src/bindings/python/bt2/bt2/version\.py$
     | tests/utils/python/vendor

  )
  '''

[tool.isort]
profile = "black"
extend_skip_glob = [
    "src/bindings/python/bt2/bt2/local_typing.py",
    "tests/utils/python/vendor/*",
]
length_sort = true

[tool.pyright]
reportPrivateUsage = false

[tool.pytest.ini_options]
python_files = [
    "test_*.py",
    "pytest_*.py",
]
norecursedirs = [
    "*.egg",
    ".*",
    "venv",
    "__py*",
]
markers = [
    "needs_lttng_utils_plugin: skip test if the `lttng-utils` plugin isn't available",
]
